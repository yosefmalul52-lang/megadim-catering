name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-frontend:
    name: Frontend production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Root script: cd frontend && npm install && npm run build → output frontend/dist/megadim-catering
      - name: Build
        run: npm run build

      - name: Verify browser output
        run: test -f frontend/dist/megadim-catering/index.html
