<div class="modal" *ngIf="open" (click)="close($event)">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ editing ? 'עריכת מוצר לחג' : 'הוספת מוצר לחג' }}</h2>
      <button type="button" class="btn-close" (click)="close()" aria-label="סגור">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="modal-body">
      <div class="form-grid">
        <div class="form-column form-column-image">
          <div class="form-group">
            <label>תמונה</label>
            <div
              class="image-upload-box"
              [class.has-image]="imagePreviewUrl || productForm.get('imageUrl')?.value"
              [class.uploading]="isUploading"
              [class.drag-over]="isDragOver"
              (dragover)="onDragOver($event)"
              (dragleave)="onDragLeave($event)"
              (drop)="onDrop($event)"
            >
              <input
                type="file"
                id="holidayProductImageUpload"
                accept="image/jpeg,image/jpg,image/png,image/webp"
                (change)="onFileSelected($event)"
                [disabled]="isUploading"
              />
              <div class="upload-box-content" *ngIf="!imagePreviewUrl && !productForm.get('imageUrl')?.value">
                <div class="upload-icon">
                  <i class="fas" [ngClass]="isUploading ? 'fa-spinner fa-spin' : 'fa-camera'"></i>
                </div>
                <p class="upload-text">{{ isUploading ? 'מעלה תמונה…' : 'לחץ להעלאת תמונה' }}</p>
                <p class="upload-hint">או גרור קובץ לכאן</p>
              </div>
              <div class="upload-preview" *ngIf="imagePreviewUrl || productForm.get('imageUrl')?.value">
                <img [src]="imagePreviewUrl || productForm.get('imageUrl')?.value" alt="תצוגה מקדימה" />
                <button type="button" class="btn-remove-preview" (click)="removeImagePreview()" title="הסר תמונה">
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
            <div class="manual-url-input">
              <label>או הזן כתובת תמונה (URL)</label>
              <input type="text" formControlName="imageUrl" class="form-input" placeholder="https://..." />
              <small>הזן נתיב לתמונה או URL</small>
            </div>
          </div>
        </div>

        <div class="form-column form-column-fields">
          <div class="form-group">
            <label>שם המנה *</label>
            <input type="text" formControlName="name" class="form-input" placeholder="שם המנה בתפריט" />
          </div>

          <div class="form-group">
            <label>מחיר</label>
            <div class="pricing-options-block">
              <div class="pricing-option-row">
                <label class="radio-option">
                  <input
                    type="radio"
                    formControlName="pricingType"
                    value="fixed"
                    (change)="onPricingTypeChange()"
                  />
                  <span>מחיר יחיד</span>
                </label>
              </div>

              <div *ngIf="isFixedPricing" class="fixed-pricing-fields">
                <div class="form-group nested">
                  <label>
                    {{
                      productForm.get('weightUnit')?.value === '100g'
                        ? 'מחיר ל-100 גרם (₪) *'
                        : 'מחיר ליחידה (₪) *'
                    }}
                  </label>
                  <input type="number" formControlName="price" class="form-input" min="0" step="0.01" />
                </div>
                <div class="form-group nested">
                  <label>יחידת מידה</label>
                  <select formControlName="weightUnit" class="form-input">
                    <option value="unit">ליחידה</option>
                    <option value="100g">ל-100 גרם</option>
                  </select>
                </div>
              </div>

              <div class="pricing-option-row">
                <label class="radio-option">
                  <input
                    type="radio"
                    formControlName="pricingType"
                    value="variants"
                    (change)="onPricingTypeChange()"
                  />
                  <span>גדלים/סוגים (Legacy)</span>
                </label>
              </div>

              <div *ngIf="!isFixedPricing" class="options-container" formArrayName="pricingOptions">
                <p class="variants-hint">מלאו תווית, כמות ומחיר בכל שורה (למשל: גדול · 500 גרם · 50)</p>
                <div class="option-row option-row-header">
                  <span>תווית *</span>
                  <span>כמות *</span>
                  <span>מחיר (₪) *</span>
                  <span></span>
                </div>
                <div
                  *ngFor="let opt of pricingOptionsArray.controls; let i = index"
                  class="option-row"
                  [formGroupName]="i"
                >
                  <input
                    type="text"
                    formControlName="label"
                    placeholder="למשל: גדול"
                    class="form-input"
                    [class.field-invalid]="opt.get('label')?.invalid && opt.get('label')?.touched"
                  />
                  <input
                    type="text"
                    formControlName="amount"
                    placeholder="למשל: 500 גרם"
                    class="form-input"
                    [class.field-invalid]="opt.get('amount')?.invalid && opt.get('amount')?.touched"
                  />
                  <input
                    type="number"
                    formControlName="price"
                    min="0"
                    step="0.01"
                    placeholder="מחיר"
                    class="form-input"
                    [class.field-invalid]="opt.get('price')?.invalid && opt.get('price')?.touched"
                  />
                  <button
                    type="button"
                    class="btn-remove-option"
                    (click)="removePricingOption(i)"
                    *ngIf="pricingOptionsArray.length > 1"
                    aria-label="הסר אפשרות"
                  >
                    <i class="fas fa-times"></i>
                  </button>
                </div>
                <button type="button" class="btn-add-option" (click)="addPricingOption()">
                  <i class="fas fa-plus"></i>
                  הוסף אפשרות
                </button>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>תיאור</label>
            <textarea formControlName="description" class="form-input" rows="4"></textarea>
          </div>
          <div class="form-group availability-toggle">
            <label class="checkbox-label">
              <input type="checkbox" formControlName="isAvailable" />
              <span>זמין להזמנה (יוצג באתר)</span>
            </label>
            <small>כיבוי יסתיר את המוצר מהלקוחות בלי למחוק אותו מהמערכת</small>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="close()">ביטול</button>
        <button type="submit" class="btn-save" [disabled]="productForm.invalid">
          {{ editing ? 'עדכן מוצר' : 'הוסף מוצר' }}
        </button>
      </div>
    </form>
  </div>
</div>
