<div class="cholent-page">
  <app-page-banner [message]="settings?.pageAnnouncements?.['cholent']?.bannerText"></app-page-banner>
  <app-page-popup
    [show]="showPopup"
    [title]="(settings?.pageAnnouncements?.['cholent']?.popupTitle) ?? ''"
    [text]="(settings?.pageAnnouncements?.['cholent']?.popupText) ?? ''"
    (close)="closePopup()"
  ></app-page-popup>
  <div class="luxury-menu-paper">
    
    <!-- Header Section -->
    <header class="menu-header">
      <h1 class="restaurant-title">הצ'ולנט בר של מגדים</h1>
      <div class="header-divider"></div>
    </header>

    <!-- Custom message from admin -->
    <div *ngIf="cholentCustomMessage" class="cholent-custom-message">
      {{ cholentCustomMessage }}
    </div>

    <!-- Closed state message (when not open and no order functionality) -->
    <div *ngIf="!isLoading && !isCholentBarOpen()" class="cholent-closed-message">
      <i class="fas fa-clock"></i>
      <p>{{ cholentClosedMessage || 'ההזמנות נפתחות ביום חמישי בין השעות 09:00 ל-17:00' }}</p>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading">
      <i class="fas fa-spinner fa-spin"></i>
      <span>טוען תפריט...</span>
    </div>

    <!-- Menu Content: sections from API, grouped by category -->
    <div *ngIf="!isLoading" class="menu-content">
      <section
        *ngFor="let group of itemsGroupedByCategory"
        class="menu-section"
      >
        <h2 class="section-title">
          <span>{{ group.categoryLabel }}</span>
        </h2>
        <div class="menu-items">
          <div *ngFor="let dish of group.items" class="menu-item">
            <div class="menu-row">
              <div class="item-details">
                <span class="item-name">{{ dish.name }}</span>
                <span class="item-dots"></span>
              </div>
              <div class="item-actions">
                <span class="item-price">{{ getPrice(dish) }} ₪</span>
              </div>
            </div>
            <p class="item-desc">{{ dish.description }}</p>
          </div>
        </div>
      </section>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && itemsGroupedByCategory.length === 0" class="empty-state">
      <p>אין מנות זמינות כרגע</p>
    </div>

  </div>
</div>
