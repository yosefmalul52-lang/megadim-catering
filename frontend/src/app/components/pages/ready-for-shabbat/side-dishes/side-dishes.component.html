<div class="category-header-actions">
  <button class="btn-gold-back" routerLink="/ready-for-shabbat">
    <i class="fas fa-arrow-right"></i> חזרה לתפריט
  </button>
</div>

<header class="luxury-category-header">
  <span class="decorative-line"></span>
  <span class="decorative-diamond"></span>
  <h1>תוספות</h1>
  <span class="decorative-diamond"></span>
  <span class="decorative-line"></span>
</header>

<div class="side-dishes-page">
  <div class="container">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading">
      <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
      <span>טוען תוספות...</span>
    </div>

    <!-- Sides Grid -->
    <div class="product-grid" *ngIf="!isLoading">
      <div 
        *ngFor="let dish of sideDishes" 
        class="product-card"
      >
        <div class="image-container">
          <img [src]="dish.imageUrl || '/assets/images/placeholder-dish.jpg'" [alt]="dish.name" (click)="viewDetails(dish)">
          <span class="badge badge-unavailable" *ngIf="!isAvailable(dish)">לא זמין כרגע</span>
        </div>

        <div class="card-content">
          <h3 (click)="viewDetails(dish)">{{ dish.name }}</h3>
          <p class="description">{{ dish.description }}</p>

          <!-- Price Per 100g Display -->
          <div class="price-unit" *ngIf="dish.pricePer100g && !hasPricingOptions(dish) && !hasPricingVariants(dish)">
            מחיר ל-100 גרם: ₪{{ dish.pricePer100g }}
          </div>

          <!-- Pricing Options (Dropdown) - same as Salads -->
          <select 
            *ngIf="hasPricingOptions(dish)"
            class="form-control"
            [value]="getSelectedOptionIndex(dish.id || dish._id || '')"
            (change)="selectPricingOption(dish.id || dish._id || '', $event)"
          >
            <option value="">בחרו אפשרות</option>
            <option *ngFor="let option of getPricingOptions(dish); let i = index" [value]="i">
              {{ option.label }} - {{ option.amount }} - ₪{{ option.price }}
            </option>
          </select>

          <!-- Size Selection (pricingVariants) -->
          <div class="size-selection" *ngIf="!hasPricingOptions(dish) && hasPricingVariants(dish)">
            <label class="size-label">בחרו גודל:</label>
            <div class="size-options">
              <button 
                *ngFor="let variant of getPricingVariants(dish); let i = index"
                class="size-btn"
                [class.active]="getSelectedVariantIndex(dish.id || dish._id || '') === i"
                (click)="selectVariant(dish.id || dish._id || '', i)"
                [attr.aria-label]="'בחרו ' + variant.label + ' עבור ' + dish.name"
              >
                <span class="size-weight">{{ variant.label }}</span>
                <span class="size-price">₪{{ variant.price }}</span>
              </button>
            </div>
          </div>

          <!-- Single Price Display -->
          <div class="price-row" *ngIf="!hasPricingOptions(dish) && !hasPricingVariants(dish) && dish.price">
            <span class="currency">₪</span>{{ getPrice(dish) }}
            <span class="unit" *ngIf="dish.pricePer100g"> / ליחידה (משוער)</span>
          </div>
          <div class="price-row" *ngIf="(hasPricingOptions(dish) || hasPricingVariants(dish)) && hasSelectedOption(dish)">
            <span class="currency">₪</span>{{ getSelectedPrice(dish) }}
          </div>

          <div class="error-message" *ngIf="hasValidationError(dish.id || dish._id || '')">
            נא לבחור גודל תחילה
          </div>

          <div class="card-actions">
            <button class="btn-outline" (click)="viewDetails(dish)">
              פרטים
            </button>
            <button class="btn-solid" (click)="addToCart(dish)" [disabled]="!isAvailable(dish)">
              <i class="fas fa-shopping-cart"></i> הוסף לסל
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && sideDishes.length === 0" class="empty-state">
      <i class="fas fa-utensils" aria-hidden="true"></i>
      <h3>אין תוספות זמינות כרגע</h3>
      <p>אנחנו עובדים על הוספת מנות חדשות. חזור בקרוב!</p>
    </div>
  </div>
</div>
