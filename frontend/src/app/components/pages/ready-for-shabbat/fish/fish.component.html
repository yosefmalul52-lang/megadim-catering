<app-page-banner [message]="settings?.pageAnnouncements?.['fish']?.bannerText"></app-page-banner>
<app-page-popup
  [show]="showPopup"
  [title]="(settings?.pageAnnouncements?.['fish']?.popupTitle) ?? ''"
  [text]="(settings?.pageAnnouncements?.['fish']?.popupText) ?? ''"
  (close)="closePopup()"
></app-page-popup>
<div class="category-header-actions">
  <button class="btn-gold-back" routerLink="/ready-for-shabbat">
    <i class="fas fa-arrow-right"></i> חזרה לתפריט
  </button>
</div>

<header class="luxury-category-header">
  <span class="decorative-line"></span>
  <span class="decorative-diamond"></span>
  <h1>דגים</h1>
  <span class="decorative-diamond"></span>
  <span class="decorative-line"></span>
</header>

<div class="fish-page">
  <div class="container">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading">
      <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
      <span>טוען דגים...</span>
    </div>

    <!-- Fish Grid -->
    <div class="product-grid unified-menu-grid" *ngIf="!isLoading">
      <div *ngFor="let dish of fishDishes" class="product-card">
        <div class="card-image-wrapper">
          <img [ngSrc]="dish.imageUrl || '/assets/images/placeholder-dish.jpg'" [alt]="dish.name" width="400" height="300" (click)="viewDetails(dish)">
          <div class="badge" *ngIf="dish.isPopular === true">מומלץ</div>
          <span class="badge-out-of-stock" *ngIf="!isAvailable(dish)">לא זמין כרגע</span>
        </div>

        <div class="card-content">
          <h4 class="card-title" (click)="viewDetails(dish)">{{ dish.name }}</h4>
          <p class="card-desc">{{ dish.description }}</p>
          
          <div class="card-price">
            <span class="currency">₪</span>{{ getPrice(dish) }}
            <span class="unit" *ngIf="dish.pricePer100g"> / ליחידה (משוער)</span>
          </div>

          <div class="card-actions">
            <button class="btn-details" (click)="viewDetails(dish)">
              פרטים
            </button>
            <button class="btn-add" (click)="addToCart(dish)" [disabled]="!isAvailable(dish)">
              <mat-icon>shopping_cart</mat-icon>
              הוספה לסל
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && fishDishes.length === 0" class="empty-state">
      <i class="fas fa-fish" aria-hidden="true"></i>
      <h3>אין דגים זמינים כרגע</h3>
      <p>אנחנו עובדים על הוספת מנות חדשות. חזור בקרוב!</p>
    </div>
  </div>
</div>
