@if (isLoading) {
  <section class="media-gallery media-gallery--loading" aria-busy="true" aria-label="טוען גלריה">
    <div class="media-gallery__inner">
      <div class="media-gallery__loading">
        <span class="media-gallery__spinner" aria-hidden="true"></span>
        <span>טוען גלריה...</span>
      </div>
    </div>
  </section>
} @else if (mediaItems.length > 0) {
  <section class="media-gallery" aria-labelledby="gallery-heading">
    <div class="media-gallery__inner">
      <header class="media-gallery__head">
        <p class="media-gallery__eyebrow">מהשטח</p>
        <h2 id="gallery-heading" class="media-gallery__title">טעימה מהאירועים שלנו</h2>
        <p class="media-gallery__lead">סרטונים ותמונות מאירועים אמיתיים — הטעם, האווירה והרמה של מגדים</p>
      </header>

      <div class="media-gallery__grid">
        @for (item of mediaItems; track trackByMediaId($index, item)) {
          <article
            class="media-card"
            [class.media-card--video]="item.type === 'video'"
            [class.media-card--image]="item.type === 'image'"
            tabindex="0"
            role="button"
            [attr.aria-label]="getAriaLabel(item)"
            (click)="onMediaClick(item)"
            (keydown.enter)="onMediaClick(item)"
            (keydown.space)="$event.preventDefault(); onMediaClick(item)"
          >
            <div class="media-card__media">
              <img
                [src]="item.imageUrl"
                [alt]="item.type === 'video' ? 'סרטון מאירוע מגדים' : 'תמונה מאירוע מגדים'"
                loading="lazy"
                (error)="onImageError($event)"
              />

              @if (item.type === 'video') {
                <span class="media-card__badge">{{ getTypeLabel(item) }}</span>
                <span class="media-card__play" aria-hidden="true">
                  <mat-icon>play_arrow</mat-icon>
                </span>
              }
            </div>
          </article>
        }
      </div>
    </div>
  </section>
}
