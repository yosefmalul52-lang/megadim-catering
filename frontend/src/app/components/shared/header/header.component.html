<header class="main-header">
  <!-- Row 1: Top Bar (minimal - phone only) -->
  <div class="top-bar">
    <div class="top-bar-content">
      <a [href]="'tel:' + contactPhone" class="mobile-phone-icon" aria-label="Call us">
        <mat-icon>phone</mat-icon>
      </a>
      <span class="desktop-phone-text">{{ 'NAV.ORDER_TEL' | translate }}</span>
    </div>
  </div>
  
  <!-- Row 2: Brand Bar (White) - Main Logo Right, Kosher + Icons Left -->
  <div class="brand-bar">
    <div class="container">
      <!-- Right Side (RTL Start): Main Logo -->
      <a routerLink="/" class="logo-container">
        <img src="https://res.cloudinary.com/dioklg7lx/image/upload/f_auto,q_auto/v1773160661/Gemini_Generated_Image_swmdneswmdneswmd_gvchgd.png" alt="קייטרינג מגדים" class="main-logo">
      </a>
      
      <!-- Left Side (RTL End): Separator + User Actions -->
      <div class="left-section">
        <div class="separator"></div>
        <div class="user-actions">
          <button mat-icon-button class="header-action-icon" aria-label="חיפוש" (click)="onSearchClick()">
            <mat-icon>search</mat-icon>
          </button>
          
          <button mat-icon-button class="header-action-icon cart-btn" aria-label="עגלת קניות" (click)="onCartClick()">
            <mat-icon>shopping_cart</mat-icon>
            <span class="cart-badge" *ngIf="cartSummary.totalItems > 0">{{ cartSummary.totalItems }}</span>
          </button>
          
          <!-- User/Profile icon only: same row, hover = dropdown; click = /login or /profile -->
          <div
            class="user-menu-wrapper"
            [class.user-menu-closed]="!isUserMenuOpen"
            (mouseenter)="onUserMenuEnter()"
            (mouseleave)="onUserMenuLeave()"
          >
            <a
              [routerLink]="(isLoggedIn$ | async) ? profileLink : '/login'"
              class="header-action-icon user-icon-trigger"
              [attr.aria-label]="(isLoggedIn$ | async) ? (currentUser?.role === 'admin' ? 'לוח בקרה' : 'הפרופיל שלי') : 'התחבר'"
            >
              <mat-icon [style.color]="(isLoggedIn$ | async) ? '#c5a059' : ''">person</mat-icon>
            </a>
            <div class="user-dropdown">
              <ng-container *ngIf="!currentUser; else loggedInDropdown">
                <div class="dropdown-login">
                  <form [formGroup]="loginForm" (ngSubmit)="onDropdownLogin()" class="dropdown-login-form">
                    <input
                      type="email"
                      formControlName="username"
                      class="dropdown-input"
                      placeholder="אימייל"
                      autocomplete="username"
                    >
                    <input
                      type="password"
                      formControlName="password"
                      class="dropdown-input"
                      placeholder="סיסמה"
                      autocomplete="current-password"
                    >
                    <p class="dropdown-login-error" *ngIf="loginError">{{ loginError }}</p>
                    <button type="submit" class="dropdown-btn dropdown-btn-primary" [disabled]="loginForm.invalid || isLoadingLogin">
                      {{ isLoadingLogin ? 'מתחבר...' : 'התחבר' }}
                    </button>
                  </form>
                  <div class="dropdown-register">
                    <a routerLink="/register" class="dropdown-link register-link">הרשמה</a>
                  </div>
                </div>
              </ng-container>
              <ng-template #loggedInDropdown>
                <div class="dropdown-logged-in">
                  <p class="dropdown-greeting">שלום, {{ currentUser?.fullName || currentUser?.name || currentUser?.username || 'משתמש' }}</p>
                  <a routerLink="/profile" class="dropdown-item" (click)="closeUserMenu()">
                    <mat-icon>person</mat-icon>
                    הפרופיל שלי
                  </a>
                  <a routerLink="/my-orders" class="dropdown-item" (click)="closeUserMenu()">
                    <mat-icon>shopping_bag</mat-icon>
                    ההזמנות שלי
                  </a>
                  <a routerLink="/admin" class="dropdown-item" *ngIf="currentUser?.role === 'admin'" (click)="closeUserMenu()">
                    <mat-icon>settings</mat-icon>
                    לוח בקרה
                  </a>
                  <button type="button" class="dropdown-item logout-btn" (click)="logout()">
                    <mat-icon>logout</mat-icon>
                    התנתק
                  </button>
                </div>
              </ng-template>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Row 3: Navigation Bar (Navy) -->
  <div class="nav-bar">
    <nav class="desktop-nav">
      <a *ngFor="let link of navLinks" [routerLink]="link.path" routerLinkActive="active-link" [routerLinkActiveOptions]="link.path === '/' ? { exact: true } : { exact: false }">{{ link.labelKey | translate }}</a>
    </nav>
    
    <button mat-icon-button class="mobile-menu-btn" (click)="sidenav?.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>
</header>
